<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dami Project</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="../static/depresi.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-light shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <h1 class="mb-0">Dami Project</h1>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container text-center" id="main-content">
        <h1 class="mb-3" style="color: #A26769;">Discover Your Personality</h1>
        <p class="mb-4">Choose your gender to start:</p>
        <div class="row justify-content-center">
            <div class="col-md-3 mb-4">
                <div class="card gender-card card-male" onclick="selectGender('Male')">
                    <img src="https://cdn.pixabay.com/photo/2024/04/16/17/13/ai-generated-8700519_1280.jpg"
                        class="card-img-top" alt="Male">
                    <div class="card-body">
                        <h5 class="card-title">Male</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card gender-card card-female" onclick="selectGender('Female')">
                    <img src="https://cdn.pixabay.com/photo/2024/04/16/17/13/ai-generated-8700520_1280.jpg"
                        class="card-img-top" alt="Female">
                    <div class="card-body">
                        <h5 class="card-title">Female</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Loading -->
    <div class="modal fade" id="loadingModal" tabindex="-1" aria-labelledby="loadingModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <h5 class="mb-3">Sedang Memproses Hasil...</h5>
                    <div class="spinner-border text-primary" role="status">
                        <span class="sr-only">Loading...</span>
                    </div>
                    <p class="mt-3">Mohon tunggu beberapa saat...</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-auto">
        <div class="container">
            <p class="mb-0">Copyright &copy; 2024 Dami Project. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/depresi.js"></script>
</body>

</html>
